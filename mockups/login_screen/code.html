<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BroHouse - Sign In</title>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts for Material 3 Typography -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Material 3 M3 Baseline Blue/Green Palette
            primary: '#0061A4',
            onPrimary: '#FFFFFF',
            primaryContainer: '#D1E4FF',
            onPrimaryContainer: '#001D36',
            secondary: '#535F70',
            onSecondary: '#FFFFFF',
            outline: '#73777F',
            surfaceVariant: '#DFE2EB',
            onSurfaceVariant: '#43474E',
            surface: '#FDFCFF',
            onSurface: '#1A1C1E',
          },
          fontFamily: {
            sans: ['Roboto', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="material-3-tweaks">
    /* Emulating Material 3 OutlinedTextField focus behavior */
    .m3-input:focus-within label {
      transform: translateY(-1.5rem) scale(0.85);
      color: #0061A4;
      background-color: #FDFCFF;
      padding: 0 4px;
    }
    .m3-input input:focus {
      outline: none;
      border-color: #0061A4;
      border-width: 2px;
    }
    /* Material 3 displaySmall typography */
    .display-small {
      font-size: 2.25rem;
      line-height: 2.75rem;
      letter-spacing: 0;
      font-weight: 400;
    }
    /* Material 3 labelLarge */
    .label-large {
      font-size: 0.875rem;
      line-height: 1.25rem;
      letter-spacing: 0.1px;
      font-weight: 500;
    }
  </style>
</head>
<body class="bg-surface text-onSurface min-h-screen flex flex-col font-sans">
<!-- BEGIN: MainContent -->
<main class="flex-1 flex flex-col px-6 py-8 max-w-md mx-auto w-full justify-center">
<!-- BEGIN: Branding -->
<section class="flex flex-col items-center mb-8" data-purpose="branding-header" id="branding">
<!-- Illustration representing shared house/group trip -->
<div class="mb-6 w-48 h-48 flex items-center justify-center bg-primaryContainer rounded-full overflow-hidden">
<img alt="Shared House Illustration" class="w-3/4 h-3/4 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCtfWv0ixB2M6VWfiKGYjy_eLdOdqsOtqRL-noPr21Xnqw0quWSLyUYT0WXYlPPKkgdRE8vp-T4zgQfxbv-0DmqrO-RMExmP_9S3wPUdMwpPjg7esk24kLQ9pvHh2QKqW9eQqI-FVg9nL-HMT2h3vNq-RMBoekOdFE4RJaR-mJxBnKLfV0BfR6K80FXPcYfx3SdLy_Lt0SjsqSkx_opSZOYaq4xhHW6GYysNEb0P-FWz8b2yD1vYJNOj6N5myDV_s4lNto2Ay3ikFU"/>
</div>
<h1 class="display-small text-primary mb-1">BroHouse</h1>
<p class="text-secondary text-base">Sign in to your account</p>
</section>
<!-- END: Branding -->
<!-- BEGIN: LoginForm -->
<section class="space-y-4" data-purpose="input-fields" id="login-form">
<!-- Email TextField -->
<div class="relative m3-input group">
<input class="block w-full px-4 py-4 text-onSurface bg-transparent border border-outline rounded-lg appearance-none focus:ring-0 peer transition-all" id="email" placeholder=" " type="email"/>
<label class="absolute text-onSurfaceVariant duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-surface px-2 peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 left-3 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4" for="email">
          Email
        </label>
</div>
<!-- Password TextField -->
<div class="relative m3-input group">
<input class="block w-full px-4 py-4 text-onSurface bg-transparent border border-outline rounded-lg appearance-none focus:ring-0 peer transition-all pr-12" id="password" placeholder=" " type="password"/>
<label class="absolute text-onSurfaceVariant duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-surface px-2 peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 left-3 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4" for="password">
          Password
        </label>
<!-- Toggle Icon (Simulated) -->
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-onSurfaceVariant" data-purpose="password-toggle" type="button">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" stroke-linecap="round" stroke-linejoin="round"></path>
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</div>
<!-- Primary Sign In Button -->
<button class="w-full bg-primary text-onPrimary h-12 rounded-full label-large hover:shadow-md active:opacity-90 transition-all mt-4" data-purpose="submit-button">
        Sign In
      </button>
</section>
<!-- END: LoginForm -->
<!-- BEGIN: AlternativeLogin -->
<section class="mt-8 flex flex-col items-center" data-purpose="social-auth">
<!-- Divider -->
<div class="relative w-full flex items-center mb-6">
<div class="flex-grow border-t border-outline/30"></div>
<span class="mx-4 text-secondary text-sm">or</span>
<div class="flex-grow border-t border-outline/30"></div>
</div>
<!-- Google Button -->
<button class="w-full border border-outline text-primary h-12 rounded-full label-large flex items-center justify-center gap-3 hover:bg-primary/5 active:bg-primary/10 transition-all" data-purpose="google-login">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
        Continue with Google
      </button>
</section>
<!-- END: AlternativeLogin -->
<!-- BEGIN: FooterLinks -->
<footer class="mt-auto pt-8 flex justify-center" data-purpose="registration-link">
<button class="text-primary label-large hover:underline">
        Don't have an account? <span class="font-bold">Register</span>
</button>
</footer>
<!-- END: FooterLinks -->
</main>
<!-- END: MainContent -->
</body></html>
