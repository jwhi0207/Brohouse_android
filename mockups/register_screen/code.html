<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0061A4",
                        "background-light": "#f8f9ff",
                        "background-dark": "#1a1c1e",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="flex flex-col min-h-screen max-w-md mx-auto px-6 py-8">
<!-- Header / Logo Section -->
<div class="flex flex-col items-center mb-8">
<div class="w-full aspect-[3/2] rounded-xl overflow-hidden mb-6 bg-primary/10 flex items-center justify-center">
<div class="w-48 h-48 bg-center bg-no-repeat bg-contain" data-alt="Modern stylish house illustration for real estate branding" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBCtfWv0ixB2M6VWfiKGYjy_eLdOdqsOtqRL-noPr21Xnqw0quWSLyUYT0WXYlPPKkgdRE8vp-T4zgQfxbv-0DmqrO-RMExmP_9S3wPUdMwpPjg7esk24kLQ9pvHh2QKqW9eQqI-FVg9nL-HMT2h3vNq-RMBoekOdFE4RJaR-mJxBnKLfV0BfR6K80FXPcYfx3SdLy_Lt0SjsqSkx_opSZOYaq4xhHW6GYysNEb0P-FWz8b2yD1vYJNOj6N5myDV_s4lNto2Ay3ikFU");'>
</div>
</div>
<h1 class="text-4xl font-bold tracking-tight text-primary">BroHouse</h1>
<p class="mt-2 text-lg font-medium text-slate-600 dark:text-slate-400">Create your account</p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-4">
<!-- Full Name Field -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1 text-slate-700 dark:text-slate-300">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-transparent border border-slate-300 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="Enter your full name" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1 text-slate-700 dark:text-slate-300">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-transparent border border-slate-300 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1 text-slate-700 dark:text-slate-300">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-transparent border border-slate-300 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="••••••••" type="password"/>
</div>
<!-- Validation Cue -->
<div class="flex items-center gap-1 px-1 mt-1">
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
<span class="text-[11px] font-semibold text-primary ml-2">Strong</span>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1 text-slate-700 dark:text-slate-300">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock_reset</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-transparent border border-slate-300 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="••••••••" type="password"/>
</div>
<p class="text-[11px] text-green-600 dark:text-green-400 px-1 flex items-center gap-1">
<span class="material-symbols-outlined text-sm">check_circle</span>
                    Passwords match
                </p>
</div>
<!-- Create Account Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all mt-4" type="submit">
                Create Account
            </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="h-[1px] flex-1 bg-slate-300 dark:bg-slate-700"></div>
<span class="text-sm font-medium text-slate-500">or</span>
<div class="h-[1px] flex-1 bg-slate-300 dark:bg-slate-700"></div>
</div>
<!-- Social Sign Up -->
<button class="w-full flex items-center justify-center gap-3 py-3.5 px-4 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-all">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-semibold text-slate-700 dark:text-slate-200">Continue with Google</span>
</button>
<!-- Footer -->
<div class="mt-auto pt-8 pb-4 text-center">
<button class="text-primary font-bold hover:underline underline-offset-4 decoration-2">
                Already have an account? Sign In
            </button>
</div>
</div>
</body></html>
